version: '3.8'

services:
  # Vector Database for RAG
  vector-db:
    image: qdrant/qdrant:latest
    container_name: cognivault-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    networks:
      - cognivault-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # CogniVault RAG API Server
  app:
    build: .
    container_name: cognivault-api
    ports:
      - "8000:8000"
    volumes:
      - ./pdfs:/app/pdfs
      - ./qdrant_local_data:/app/qdrant_local_data
      - ./pdf_tracker.db:/app/pdf_tracker.db
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://vector-db:6333
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - PYTHONUNBUFFERED=1
    depends_on:
      vector-db:
        condition: service_healthy
    networks:
      - cognivault-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_storage:
    driver: local

networks:
  cognivault-network:
    driver: bridge